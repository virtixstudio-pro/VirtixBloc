plugins {
    id 'com.android.application'
}
android {
    namespace 'com.virtixstudio.virtixbloc'
    compileSdk 33
    defaultConfig {
        applicationId "com.virtixstudio.virtixbloc"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release { minifyEnabled false }
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
